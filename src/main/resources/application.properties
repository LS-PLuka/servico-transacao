# Configurações da aplicação
spring.application.name=servico-transacao

# Banco de dados
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/antifraude}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# JWT
jwt.secret=${JWT_SECRET:chave-secreta-local-minimo-256-bits-aqui}
jwt.expiracao-horas=${JWT_EXPIRACAO_HORAS:24}

# Admin inicial
admin.email=${ADMIN_EMAIL:admin@antifraude.com}
admin.senha=${ADMIN_SENHA:admin123456}
admin.nome=${ADMIN_NOME:Administrador}

# Servidor
server.port=8080

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
